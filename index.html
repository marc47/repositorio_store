<!--pagina de inicio-->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Pagina de inicio de tienda mobil online">
    
    <title>Inicio</title>
    <!--se cambio la ruta de la hoja de estilos-->
    <link rel="stylesheet" href="./fashion_store/css/styles.css">
</head>

<header class="header">
    <!--saludo de bienvenida personalizado-->
    <h3 class="welcome-message">Bienvenido a Fashion Store Usuario</h3>
    <img src="./fashion_store/storage/img/userIcon.webp" alt="user-pic" class="user-picture">
</header>
    <!--Menu movil con "Inicio", "carrito de compras", "favoritos", "perfil"-->
     
    <nav class="mobile-menu">
        <div class="mobile-menu-toggle">
            <input type="checkbox" id="menu-toggle" class="menu-toggle">
            <label for="menu-toggle" class="burguer">☰</label>
        </div>
            <ul class="menu">
                <li><label for="inicio">🏠</label>
                    <a href="#inicio">Inicio</a></li>
                <li><label for="carrito">🛒</label>
                    <a href="#carrito">Carrito de compras</a></li>
                <li><label for="favoritos">🤍</label>
                    <a href="#favoritos">Favoritos</a></li>
                <li><label for="perfil">👤</label>
                    <a href="#perfil">Perfil</a></li>
            </ul>
    </nav>

<body>
    <!--barra de busqueda-->
    <form class="search-bar" action="#" aria-label="Buscar productos">
        <input id="searchInput" type="search" placeholder="Buscar productos" aria-label="Buscar productos">
        <button id="searchButton" type="submit">Buscar</button>
    </form>
        <!--categorias disponibles-->
        <h2 class="categories-title">Categorias Disponibles</h2><br>
        <section class="product-cards">
            <!--tarjetas de productos-->
            <div class="product-card">
                <h2 class="product-title">Producto 1</h2>
                    <img src="./fashion_store/storage/img/product1.jpg" alt="Imagen del producto 1" class="product-image"></button><br>
                        <input type="checkbox" id="add-to-favorites" class="favorites-toggle">
                            <label for="add-to-favorites" class="favoritos">🤍</label>
                    <div class="product-info">
                        <span class="product-category">Bolso</span>
                        <span class="product-price">$19.99</span>
                    </div>                        
                    <span class="product-rating">⭐⭐⭐⭐☆</span>
            </div>
            <div class="product-card">
                <h2 class="product-title">Producto 2</h2>
                <img src="./fashion_store/storage/img/product2.jpg" alt="Imagen del producto 2" class="product-image"></button><br>
                     <input type="checkbox" id="add-to-favorites" class="favorites-toggle">
                        <label for="add-to-favorites" class="favoritos">🤍</label>
                    <div class="product-info">
                        <span class="product-category">Vestido</span>
                        <span class="product-price">$29.99</span>
                    </div>
                    <span class="product-rating">⭐⭐⭐☆☆</span>
            </div>
            <div class="product-card">
                <h2 class="product-title">Producto 3</h2>
                <img src="./fashion_store/storage/img/product3.jpg" alt="Imagen del producto 3" class="product-image"></button><br>
                     <input type="checkbox" id="add-to-favorites" class="favorites-toggle">
                        <label for="add-to-favorites" class="favoritos">🤍</label>
                    <div class="product-info">
                        <span class="product-category">Vestido</span>
                        <span class="product-price">$39.99</span>
                    </div>
                    <span class="product-rating">⭐⭐⭐⭐⭐</span>
            </div>
            <div class="product-card">
                <h2 class="product-title">Producto 4</h2>
                <img src="./fashion_store/storage/img/product4.jpg" alt="Imagen del producto 4" class="product-image"></button><br>
                     <input type="checkbox" id="add-to-favorites" class="favorites-toggle">
                        <label for="add-to-favorites" class="favoritos">🤍</label>
                    <div class="product-info">
                        <span class="product-category">Bolso</span>
                        <span class="product-price">$49.99</span>
                    </div>
                    <span class="product-rating">⭐⭐☆☆☆</span>
            </div>
            <div class="product-card">
                <h2 class="product-title">Producto 5</h2>
                <img src="./fashion_store/storage/img/product5.jpg" alt="Imagen del producto 5" class="product-image"></button><br>
                     <input type="checkbox" id="add-to-favorites" class="favorites-toggle">
                        <label for="add-to-favorites" class="favoritos">🤍</label>
                    <div class="product-info">
                        <span class="product-category">Chaqueta</span>
                        <span class="product-price">$59.99</span>
                    </div>
                    <span class="product-rating">⭐⭐⭐⭐☆</span>
            </div>
        </section>
        
</body>
</html>
